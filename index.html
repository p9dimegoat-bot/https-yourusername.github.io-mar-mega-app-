<!DOCTYPE html>
<html>
<head>
  <title>Mar's Multiplayer Game</title>
  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: black;
      color: white;
      text-align: center;
    }

    header {
      background: #111;
      padding: 15px;
    }

    button {
      padding: 12px 20px;
      margin: 10px;
      border-radius: 8px;
      border: none;
      cursor: pointer;
    }

    #clickBtn {
      background: lime;
      color: black;
      font-size: 18px;
    }

    input {
      padding: 8px;
      border-radius: 6px;
      border: none;
    }

    #leaderboard {
      margin-top: 20px;
    }
  </style>
</head>
<body>

<header>
  <h1>🔥 Mar's Multiplayer Game 🔥</h1>
</header>

<h2>Enter Username</h2>
<input id="username" placeholder="Your name">
<br>
<button onclick="saveUsername()">Save Name</button>

<h2>Score: <span id="score">0</span></h2>
<button id="clickBtn" onclick="addScore()">CLICK</button>

<h2>🏆 Global Leaderboard</h2>
<div id="leaderboard"></div>

<!-- Firebase CDN -->
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

<script>
  // Your Firebase config
  const firebaseConfig = {
    apiKey: "AIzaSyBPE7bdGfbl37Btraqg0v9x0ZTP9SBucvA",
    authDomain: "mar-mega-app.firebaseapp.com",
    projectId: "mar-mega-app",
    storageBucket: "mar-mega-app.firebasestorage.app",
    messagingSenderId: "497388633227",
    appId: "1:497388633227:web:43b6dd756ca98a2bc0688e"
  };

  // Initialize Firebase
  firebase.initializeApp(firebaseConfig);
  const db = firebase.firestore();

  let username = "";
  let score = 0;

  function saveUsername() {
    username = document.getElementById("username").value;
    alert("Saved as " + username);
  }

  async function addScore() {
    if (!username) {
      alert("Enter username first!");
      return;
    }

    score++;
    document.getElementById("score").innerText = score;

    await db.collection("players").doc(username).set({
      score: score
    });

    loadLeaderboard();
  }

  async function loadLeaderboard() {
    const snapshot = await db.collection("players").get();
    let players = [];

    snapshot.forEach(doc => {
      players.push({
        name: doc.id,
        score: doc.data().score
      });
    });

    players.sort((a, b) => b.score - a.score);

    let html = "";
    players.slice(0, 10).forEach(player => {
      html += `<div>${player.name}: ${player.score}</div>`;
    });

    document.getElementById("leaderboard").innerHTML = html;
  }

  loadLeaderboard();
</script>

</body>
</html>
