<!DOCTYPE html>
<html>
<head>
  <title>Mar's Ranked Competitive MMO</title>
  <style>
    body { margin:0; font-family:Arial,sans-serif; background:linear-gradient(135deg,#000,#1a1a1a); color:white; text-align:center; transition:.3s; }
    header { padding:20px; font-size:28px; font-weight:bold; }
    button { padding:12px 20px; margin:10px; border-radius:10px; border:none; cursor:pointer; font-size:16px; transition:.2s; }
    button:hover { transform:scale(1.1); }
    .card,.section { margin-top:20px; padding:15px; background:#222; border-radius:12px; display:inline-block; }
    #avatarPreview { width:100px; height:100px; border-radius:50%; border:2px solid gold; margin:10px; }
    .chatBox { height:150px; overflow-y:auto; background:#111; padding:10px; border-radius:8px; text-align:left; margin-bottom:10px; }
    .notification { background:yellow; color:black; padding:5px 10px; border-radius:8px; margin:5px; display:inline-block;}
    .emoteDisplay { font-size:36px; margin:10px; }
  </style>
</head>
<body>

<header>🔥 Mar's Ranked Competitive MMO 🔥</header>

<button id="loginBtn" onclick="googleLogin()">Login with Google</button>

<div class="card">
  <h2 id="welcome"></h2>
  <h3>Score: <span id="score">0</span> | Level: <span id="level">1</span> | XP: <span id="xp">0</span> | Prestige: <span id="prestige">0</span></h3>
  <button onclick="addScore()">CLICK</button>
</div>

<div class="section" id="avatars">
  <h3>Custom Avatar</h3>
  <img id="avatarPreview" src="https://via.placeholder.com/100">
  <button onclick="changeAvatar('red')">Red</button>
  <button onclick="changeAvatar('blue')">Blue</button>
  <button onclick="changeAvatar('green')">Green</button>
</div>

<div class="section" id="prestige">
  <h3>Prestige / Rebirth</h3>
  <button onclick="prestigePlayer()">Prestige Now</button>
  <h4 id="prestigeStatus"></h4>
</div>

<div class="section" id="emotes">
  <h3>Emotes</h3>
  <button onclick="useEmote('🎉')">🎉</button>
  <button onclick="useEmote('🔥')">🔥</button>
  <div id="emoteDisplay" class="emoteDisplay"></div>
</div>

<div class="section" id="chat">
  <h3>Global Chat</h3>
  <div id="chatMessages" class="chatBox"></div>
  <input id="chatInput" placeholder="Type message..." style="width:70%">
  <button onclick="sendGlobalChat()">Send</button>
</div>

<div class="section" id="guildChat">
  <h3>Guild Chat</h3>
  <div id="guildMessages" class="chatBox"></div>
  <input id="guildInput" placeholder="Type guild message..." style="width:70%">
  <button onclick="sendGuildChat()">Send</button>
</div>

<div class="section" id="matchmaking">
  <h3>Matchmaking & Ranked Ladder</h3>
  <button onclick="joinMatch()">Join 1v1 Ranked Match</button>
  <div id="matchMessages" class="chatBox"></div>
</div>

<div class="section" id="tournament">
  <h3>Live Tournament Brackets</h3>
  <button onclick="joinTournament()">Join Tournament</button>
  <div id="tournamentMessages" class="chatBox"></div>
</div>

<div class="section" id="raid">
  <h3>Raid / Boss Events</h3>
  <button onclick="joinRaid()">Join Raid Boss</button>
  <div id="raidMessages" class="chatBox"></div>
</div>

<div class="section" id="leaderboards">
  <h3>Leaderboards</h3>
  <div id="globalLeaderboard"></div>
  <div id="guildLeaderboard"></div>
  <div id="prestigeLeaderboard"></div>
  <div id="rankedLeaderboard"></div>
</div>

<div id="notifications"></div>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>

<script>
const firebaseConfig={apiKey:"AIzaSyBPE7bdGfbl37Btraqg0v9x0ZTP9SBucvA",authDomain:"mar-mega-app.firebaseapp.com",projectId:"mar-mega-app",storageBucket:"mar-mega-app.firebasestorage.app",messagingSenderId:"497388633227",appId:"1:497388633227:web:43b6dd756ca98a2bc0688e"};
firebase.initializeApp(firebaseConfig);
const db=firebase.firestore(), auth=firebase.auth();

let currentUser=null, score=0, xp=0, level=1, prestige=0, inventory={avatar:'default'};

// --- Auth ---
function googleLogin(){ auth.signInWithPopup(new firebase.auth.GoogleAuthProvider()); }
auth.onAuthStateChanged(async(user)=>{
  if(user){
    currentUser=user;
    document.getElementById("welcome").innerText="Welcome, "+user.displayName;
    await loadUserData();
    listenGlobalChat(); listenGuildChat(); listenMatchmaking(); listenTournament(); listenRaid();
  }
});

// --- Core functions ---
function loadUserData(){ /* load score, xp, avatar, prestige */ }
function addScore(){ score++; document.getElementById("score").innerText=score; }
function changeAvatar(color){ inventory.avatar=color; db.collection("players").doc(currentUser.uid).update({inventory}); updateAvatar(); showNotification(`Avatar changed to ${color}`);}
function updateAvatar(){ document.getElementById("avatarPreview").src=`https://via.placeholder.com/100/${inventory.avatar==='default'?'cccccc':inventory.avatar}`; }
function prestigePlayer(){ if(level<50) return alert("Reach level 50 to prestige!"); prestige++; score=0; xp=0; level=1; db.collection("players").doc(currentUser.uid).update({prestige,score,xp,level}); showNotification(`You prestiged! Total Prestige: ${prestige}`); document.getElementById("prestigeStatus").innerText=`Prestige: ${prestige}`; }
function useEmote(emote){ document.getElementById("emoteDisplay").innerText=emote; showNotification(`You used emote ${emote}`); }
function showNotification(msg){ const n=document.createElement("div"); n.className="notification"; n.innerText=msg; document.getElementById("notifications").appendChild(n); setTimeout(()=>n.remove(),4000); }

// --- Global Chat ---
function sendGlobalChat(){ const msg=document.getElementById("chatInput").value; if(!msg) return; db.collection("globalChat").add({uid:currentUser.uid,name:currentUser.displayName,message:msg,timestamp:Date.now()}); document.getElementById("chatInput").value=""; }
function listenGlobalChat(){ db.collection("globalChat").orderBy("timestamp").onSnapshot(snap=>{ const container=document.getElementById("chatMessages"); container.innerHTML=""; snap.forEach(doc=>{ const d=doc.data(); const div=document.createElement("div"); div.className="chatMessage"; div.innerText=`${d.name}: ${d.message}`; container.appendChild(div); }); container.scrollTop=container.scrollHeight; }); }

// --- Guild Chat ---
function sendGuildChat(){ if(!currentUser.guild) return alert("Join a guild first!"); const msg=document.getElementById("guildInput").value; if(!msg) return; db.collection("guilds").doc(currentUser.guild).collection("chat").add({uid:currentUser.uid,name:currentUser.displayName,message:msg,timestamp:Date.now()}); document.getElementById("guildInput").value=""; }
function listenGuildChat(){ if(!currentUser.guild) return; db.collection("guilds").doc(currentUser.guild).collection("chat").orderBy("timestamp").onSnapshot(snap=>{ const container=document.getElementById("guildMessages"); container.innerHTML=""; snap.forEach(doc=>{ const d=doc.data(); const div=document.createElement("div"); div.className="chatMessage"; div.innerText=`${d.name}: ${d.message}`; container.appendChild(div); }); container.scrollTop=container.scrollHeight; }); }

// --- Ranked Matchmaking ---
function joinMatch(){ showNotification("Joined Ranked Match Queue"); db.collection("matches").add({uid:currentUser.uid,name:currentUser.displayName,score:score,timestamp:Date.now()}); }
function listenMatchmaking(){ db.collection("matches").orderBy("timestamp").onSnapshot(snap=>{ const container=document.getElementById("matchMessages"); container.innerHTML=""; snap.forEach(doc=>{ const d=doc.data(); const div=document.createElement("div"); div.className="chatMessage"; div.innerText=`${d.name} in queue`; container.appendChild(div); }); container.scrollTop=container.scrollHeight; }); }

// --- Tournament Brackets ---
function joinTournament(){ showNotification("Joined Tournament"); db.collection("tournaments").add({uid:currentUser.uid,name:currentUser.displayName,timestamp:Date.now()}); }
function listenTournament(){ db.collection("tournaments").orderBy("timestamp").onSnapshot(snap=>{ const container=document.getElementById("tournamentMessages"); container.innerHTML=""; snap.forEach(doc=>{ const d=doc.data(); const div=document.createElement("div"); div.className="chatMessage"; div.innerText=`${d.name} joined tournament`; container.appendChild(div); }); container.scrollTop=container.scrollHeight; }); }

// --- Raid Boss ---
function joinRaid(){ showNotification("Joined Raid Boss Event"); db.collection("raidBoss").add({uid:currentUser.uid,name:currentUser.displayName,damage:0,timestamp:Date.now()}); }
function listenRaid(){ db.collection("raidBoss").orderBy("timestamp").onSnapshot(snap=>{ const container=document.getElementById("raidMessages"); container.innerHTML=""; snap.forEach(doc=>{ const d=doc.data(); const div=document.createElement("div"); div.className="chatMessage"; div.innerText=`${d.name} joined the raid`; container.appendChild(div); }); container.scrollTop=container.scrollHeight; }); }
</script>

</body>
</html>
