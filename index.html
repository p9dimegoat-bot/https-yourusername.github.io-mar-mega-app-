<!DOCTYPE html>
<html>
<head>
  <title>Mar's MMO Arcade Ultimate</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #000, #1a1a1a);
      color: white;
      text-align: center;
      transition: 0.3s;
    }
    header { padding: 20px; font-size: 28px; font-weight: bold; }
    button {
      padding: 12px 20px;
      margin: 10px;
      border-radius: 10px;
      border: none;
      cursor: pointer;
      font-size: 16px;
      transition: 0.2s;
      position: relative;
      overflow: hidden;
    }
    button:hover { transform: scale(1.1); }
    #loginBtn { background: #4285F4; color: white; }
    #clickBtn { background: lime; color: black; font-size: 20px; }
    #upgradeBtn, .shopBtn, #miniGameBtn, #spinWheelBtn, .missionBtn { background: orange; color: black; }
    #leaderboard { margin-top: 20px; background: #111; padding: 15px; border-radius: 12px; display: inline-block; min-width: 250px; }
    .card, #shop, #miniGames, #missions, #badges { margin-top: 20px; padding:15px; background:#222; border-radius:12px; display:inline-block;}
    .particle { position: absolute; width: 8px; height: 8px; border-radius: 50%; pointer-events: none; animation: float 0.8s forwards; }
    @keyframes float { 0% {transform:translateY(0) scale(1); opacity:1;} 100% {transform:translateY(-50px) scale(0); opacity:0;} }
    .topPlayer { animation: pulse 1s infinite alternate; }
    @keyframes pulse { 0% { transform: scale(1); color: gold; } 100% { transform: scale(1.1); color: orange; } }
    .badge { display:inline-block; margin:5px; padding:5px 10px; background:#444; border-radius:8px; color:yellow; font-weight:bold;}
  </style>
</head>
<body>

<header>🔥 Mar's MMO Arcade Ultimate 🔥</header>

<button id="loginBtn" onclick="googleLogin()">Login with Google</button>

<div class="card">
  <h2 id="welcome"></h2>
  <h3>Score: <span id="score">0</span> | Level: <span id="level">1</span> | XP: <span id="xp">0</span></h3>
  <button id="clickBtn" onclick="addScore()">CLICK</button>
  <br>
  <button id="upgradeBtn" onclick="buyUpgrade()">Buy 2x Click (Cost: 20)</button>
  <button class="shopBtn" onclick="buyTriple()">Buy 3x Click (Cost: 50)</button>
  <h4 id="upgradeStatus"></h4>
</div>

<div id="shop">
  <h3>Mini Shop / Cosmetics</h3>
  <button class="shopBtn" onclick="buyButtonColor()">Change Button Color (Cost: 30)</button>
  <button class="shopBtn" onclick="buyBackground()">Change Background (Cost: 50)</button>
  <h4 id="shopStatus"></h4>
  <h4 id="dailyRewardStatus"></h4>
</div>

<div id="miniGames">
  <h3>Mini Games</h3>
  <button id="miniGameBtn" onclick="startBonusClick()">Bonus Click Challenge</button>
  <button id="spinWheelBtn" onclick="spinWheel()">Spin The Wheel</button>
  <h4 id="miniGameStatus"></h4>
</div>

<div id="missions">
  <h3>Missions / Quests</h3>
  <div id="missionList"></div>
</div>

<div id="badges">
  <h3>Badges</h3>
  <div id="badgeList"></div>
</div>

<h2>🏆 Live Leaderboard</h2>
<div id="leaderboard"></div>

<audio id="clickSound" src="https://freesound.org/data/previews/341/341695_62434-lq.mp3"></audio>

<!-- Firebase CDN -->
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyBPE7bdGfbl37Btraqg0v9x0ZTP9SBucvA",
  authDomain: "mar-mega-app.firebaseapp.com",
  projectId: "mar-mega-app",
  storageBucket: "mar-mega-app.firebasestorage.app",
  messagingSenderId: "497388633227",
  appId: "1:497388633227:web:43b6dd756ca98a2bc0688e"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();
const auth = firebase.auth();

let currentUser=null, score=0, multiplier=1, inventory={buttonColor:false,background:false}, lastClaim=0, xp=0, level=1;
let achievements=[], missions=[], badges=[];
const clickSound=document.getElementById("clickSound");

function googleLogin(){ auth.signInWithPopup(new firebase.auth.GoogleAuthProvider()); }

auth.onAuthStateChanged(async(user)=>{
  if(user){
    currentUser=user;
    document.getElementById("welcome").innerText="Welcome, "+user.displayName;
    await loadUserData();
    checkDailyReward();
    loadMissions();
  }
});

async function loadUserData(){
  const docRef=db.collection("players").doc(currentUser.uid);
  const docSnap=await docRef.get();
  if(docSnap.exists){
    const data=docSnap.data();
    score=data.score||0;
    multiplier=data.multiplier||1;
    inventory=data.inventory||{buttonColor:false,background:false};
    lastClaim=data.lastClaim||0;
    xp=data.xp||0;
    level=Math.floor(xp/100)+1;
    achievements=data.achievements||[];
    badges=data.badges||[];
  } else {
    await docRef.set({name:currentUser.displayName, score:0, multiplier:1, inventory:{}, lastClaim:0, xp:0, achievements:[], badges:[]});
  }
  applyCosmetics();
  updateUI();
  displayBadges();
}

function updateUI(){
  document.getElementById("score").innerText=score;
  document.getElementById("xp").innerText=xp;
  document.getElementById("level").innerText=level;
  document.getElementById("upgradeStatus").innerText=multiplier>1?`${multiplier}x Click Active!`:"";
  document.getElementById("shopStatus").innerText=(inventory.buttonColor||inventory.background)?"Cosmetics Active!":"";
}

function applyCosmetics(){
  if(inventory.buttonColor) document.getElementById("clickBtn").style.backgroundColor="cyan";
  if(inventory.background) document.body.style.background="linear-gradient(135deg,purple,black)";
}

async function addScore(){
  if(!currentUser) return alert("Login first!");
  score+=multiplier;
  xp+=multiplier;
  level=Math.floor(xp/100)+1;
  clickSound.play();
  createParticleEffect();
  await saveUser();
  updateUI();
  checkAchievements();
  checkMissions();
}

function createParticleEffect(){
  const btn=document.getElementById("clickBtn");
  for(let i=0;i<5;i++){
    const particle=document.createElement("div");
    particle.className="particle";
    particle.style.left=Math.random()*btn.offsetWidth+"px";
    particle.style.backgroundColor=["lime","cyan","yellow"][Math.floor(Math.random()*3)];
    btn.appendChild(particle);
    setTimeout(()=>particle.remove(),800);
  }
}

async function buyUpgrade(){ if(score>=20 && multiplier===1){ score-=20; multiplier=2; await saveUser(); updateUI(); } }
async function buyTriple(){ if(score>=50 && multiplier<3){ score-=50; multiplier=3; await saveUser(); updateUI(); } }
async function buyButtonColor(){ if(score>=30 && !inventory.buttonColor){ score-=30; inventory.buttonColor=true; applyCosmetics(); await saveUser(); updateUI(); } }
async function buyBackground(){ if(score>=50 && !inventory.background){ score-=50; inventory.background=true; applyCosmetics(); await saveUser(); updateUI(); } }

async function saveUser(){ await db.collection("players").doc(currentUser.uid).set({name:currentUser.displayName,score:score,multiplier:multiplier,inventory:inventory,lastClaim:lastClaim,xp:xp,level:level,achievements:achievements,badges:badges},{merge:true}); }

db.collection("players").onSnapshot(snapshot=>{
  let players=[];
  snapshot.forEach(doc=>players.push({name:doc.data().name,score:doc.data().score}));
  players.sort((a,b)=>b.score-a.score);
  let html="";
  players.slice(0,10).forEach((p,i)=>html+=`<div class="${i<3?'topPlayer':''}">${p.name}: ${p.score}</div>`);
  document.getElementById("leaderboard").innerHTML=html;
});

// Daily reward
function checkDailyReward(){
  const now=new Date().getTime();
  const oneDay=24*60*60*1000;
  if(now-lastClaim>=oneDay){
    const reward=Math.floor(Math.random()*16)+5;
    score+=reward;
    lastClaim=now;
    document.getElementById("dailyRewardStatus").innerText=`🎁 Daily Reward: +${reward} points!`;
    saveUser();
    updateUI();
  } else document.getElementById("dailyRewardStatus").innerText="";
}

// Mini-game: Bonus Click Challenge
let bonusClicks=0, bonusInterval=null;
function startBonusClick(){
  if(!currentUser) return alert("Login first!");
  bonusClicks=0;
  document.getElementById("miniGameStatus").innerText="Click as fast as you can for 10 seconds!";
  const oldClick=document.getElementById("clickBtn").onclick;
  document.getElementById("clickBtn").onclick=function(){ addScore(); bonusClicks++; };
  bonusInterval=setTimeout(async ()=>{
    const reward=Math.floor(Math.random()*2+1)*bonusClicks;
    score+=reward;
    xp+=Math.floor(reward/2);
    level=Math.floor(xp/100)+1;
    document.getElementById("miniGameStatus").innerText=`🎉 Bonus Click Reward: +${reward} points!`;
    document.getElementById("clickBtn").onclick=oldClick;
    await saveUser();
    updateUI();
    checkAchievements();
    checkMissions();
  },10000);
}

// Spin-The-Wheel
function spinWheel(){
  if(!currentUser) return alert("Login first!");
  const rewards=["+10","+20","+50","2x","3x","button","background","none"];
  const idx=Math.floor(Math.random()*rewards.length);
  const reward=rewards[idx];
  switch(reward){
    case "+10": score+=10; xp+=5; break;
    case "+20": score+=20; xp+=10; break;
    case "+50": score+=50; xp+=25; break;
    case "2x": if(multiplier<2) multiplier=2; break;
    case "3x": multiplier=3; break;
    case "button": inventory.buttonColor=true; applyCosmetics(); break;
    case "background": inventory.background=true; applyCosmetics(); break;
    case "none": break;
  }
  level=Math.floor(xp/100)+1;
  document.getElementById("miniGameStatus").innerText=`🎡 Spin Reward: ${reward}`;
  saveUser();
  updateUI();
  checkAchievements();
  checkMissions();
}

// Achievements
function checkAchievements(){
  if(xp>=100 && !achievements.includes("Reached 100 XP!")) achievements.push("Reached 100 XP!");
  if(multiplier>=2 && !achievements.includes("Unlocked 2x Click!")) achievements.push("Unlocked 2x Click!");
  if(level>=5 && !achievements.includes("Reached Level 5!")) achievements.push("Reached Level 5!");
}

// Missions
function loadMissions(){
  missions=[
    {id:1, text:"Click 500 times", completed:false, condition:()=>xp>=500, reward:{points:50, badge:"Clicker Master"}},
    {id:2, text:"Play Mini-game 3 times", completed:false, condition:()=>xp>=200, reward:{points:20, badge:"Mini Gamer"}},
    {id:3, text:"Reach Level 10", completed:false, condition:()=>level>=10, reward:{points:100, badge:"Level Pro"}}
  ];
  displayMissions();
}

function checkMissions(){
  missions.forEach(async m=>{
    if(!m.completed && m.condition()){
      m.completed=true;
      score+=m.reward.points;
      if(!badges.includes(m.reward.badge)) badges.push(m.reward.badge);
      document.getElementById("miniGameStatus").innerText+=" | Mission Completed: "+m.text+"!";
      displayMissions();
      displayBadges();
      await saveUser();
      updateUI();
    }
  });
}

function displayMissions(){
  document.getElementById("missionList").innerHTML="";
  missions.forEach(m=>{
    const el=document.createElement("div");
    el.innerText=m.text + (m.completed?" ✅":"");
    document.getElementById("missionList").appendChild(el);
  });
}

function displayBadges(){
  document.getElementById("badgeList").innerHTML="";
  badges.forEach(b=>{
    const el=document.createElement("span");
    el.className="badge";
    el.innerText=b;
    document.getElementById("badgeList").appendChild(el);
  });
}
</script>
</body>
</html>
